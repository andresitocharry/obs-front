version: '3.8'

services:
  web:
    build:
      context: .
      target: development
    container_name: dqg_frontend_web
    ports:
      - "3000:3000"
    volumes:
      - .:/app:delegated
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: always

volumes:
  frontend_node_modules:
  frontend_next_cache:
